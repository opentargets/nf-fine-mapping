name: Build and Push Collector Docker Image

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "tools/collector/Dockerfile"
            - "tools/collector/pyproject.toml"

jobs:
    build-and-push:
        name: Build sushie image (amd64 + arm64)
        runs-on: ubuntu-22.04

        permissions:
            packages: write
            contents: read
            attestations: write
            id-token: write

        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Read version
              id: version
              run: echo "TAG=$(cat tools/collector/pyproject.toml | grep version | awk -F'=' '{print $2}' | tr -d ' ')" >> $GITHUB_OUTPUT

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
              with:
                  image: tonistiigi/binfmt:qemu-v7.0.0-28

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              id: push
              uses: docker/build-push-action@v6
              with:
                  context: tools/collector
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      COLLECTOR_VERSION=${{ steps.version.outputs.TAG }}
                  tags: |
                      ghcr.io/${{ github.repository }}/collector:latest
                      ghcr.io/${{ github.repository }}/collector:${{ steps.version.outputs.TAG }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                  subject-name: ghcr.io/${{ github.repository }}/collector
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true
